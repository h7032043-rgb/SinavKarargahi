name: APK Basma Operasyonu
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Buildozer ile APK Hazırla
        uses: Entepotence/buildozer-action@v1.2.2
        with:
          workdir: .
          buildozer_version: master

      - name: APK Dosyasını Teslim Et
        uses: actions/upload-artifact@v4
        with:
          name: Sinav-Karargahi-APK
          path: bin/*.apk
